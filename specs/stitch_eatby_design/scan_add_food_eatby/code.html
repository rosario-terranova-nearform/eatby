<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scan Food - EatBy</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#002113",

                        "secondary-fixed": "#ffdad7",
                        "primary-fixed-dim": "#4edea3",
                        "inverse-surface": "#2b322d",
                        "outline": "#6c7a71",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#eef6ee",
                        "surface-container-highest": "#dde4dd",
                        "tertiary-fixed-dim": "#ffb95f",
                        "surface-bright": "#f4fbf4",
                        "on-tertiary-fixed-variant": "#653e00",
                        "surface-variant": "#dde4dd",

                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#fffbff",
                        "on-surface-variant": "#3c4a42",

                        "secondary": "#b61722",
                        "inverse-on-surface": "#ebf3eb",
                        "surface-dim": "#d4dcd5",
                        "tertiary": "#855300",
                        "outline-variant": "#bbcabf",
                        "background": "#f4fbf4",
                        "tertiary-container": "#e29100",
                        "surface-container-high": "#e3eae3",
                        "on-tertiary-container": "#523200",
                        "surface-tint": "#006c49",
                        "on-primary-container": "#00422b",
                        "on-tertiary": "#ffffff",
                        "secondary-container": "#da3437",
                        "on-error-container": "#93000a",

                        "on-secondary": "#ffffff"

                    "borderRadius": {

                    "spacing": {

                        "container-margin": "20px",

                        "sm": "16px",

                        "xl": "48px",
                        "xs": "8px",
                        "gutter": "16px"

                    "fontFamily": {
                        "headline-lg-mobile": ["Hanken Grotesk"],

                        "body-lg": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "display": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],

                        "display": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]

                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .scanner-view {
            position: relative;
            overflow: hidden;
        }
        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0) 20%, rgba(0,0,0,0) 80%, rgba(0,0,0,0.4));
        }
        .scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: #10b981;
            box-shadow: 0 0 15px #10b981;
            top: 50%;
        }
        .barcode-target {
            width: 240px;
            height: 160px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-background border-b border-outline-variant dark:border-outline flex justify-between items-center px-container-margin py-sm w-full top-0 z-40">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="inventory_2">inventory_2</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">EatBy</h1>
</div>
<button class="text-on-surface-variant dark:text-outline-variant hover:bg-surface-container dark:hover:bg-surface-variant p-xs transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Content: Full-page Scan Screen -->
<main class="flex-1 overflow-y-auto pb-xl">
<!-- Scanner View -->
<div class="scanner-view h-72 bg-black relative">
<img alt="Grocery shelf perspective" class="w-full h-full object-cover opacity-60" data-alt="A POV camera view looking through a digital lens at a grocery shelf filled with colorful fresh produce. The scene is slightly dimmed with a dark overlay to suggest a camera viewfinder interface. High-key green and sharp white highlights emphasize the scanner's focus area. Modern, professional digital aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJcGyK2zOMLprVSAC2mwWxn9DeYq2UZGMWH0-5TY2hZhsRvu5z7F_6eXMtqoPtVTksOi8XYt5ZGFOdZ6ZUD3ujl2-wqxvJNYrEIMNWhoQeF666NWlh7rdAZDwFmJ6N_jaEW2nT9YzruGDAoklQGV5vHvBofb6jQq_Y_vCQNzRF0KOP0NwWmRLRVltVPZQJnyDyRFW3uR2FFQRIOOKQD2s2IRayYvPiaDbu5iZL4-opaICQfafgqyz53j5s7q1YyJZGzUcxnrDbXJPh"/>
<div class="scanner-overlay"></div>
<div class="barcode-target"></div>
<div class="scanner-line"></div>
<div class="absolute bottom-sm left-0 w-full text-center">
<span class="bg-black/60 text-white font-label-caps text-[10px] px-sm py-1 rounded-full border border-white/20">ALIGN BARCODE WITHIN BOX</span>
</div>
</div>
<!-- Form Fields -->
<div class="p-container-margin space-y-md">
<h2 class="font-headline-md text-headline-md mb-xs">Add New Item</h2>
<!-- Product Name Field (Pre-populated) -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-wider">Product Name</label>
<div class="relative">
<input class="w-full bg-white border border-outline text-body-md px-sm py-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all rounded-lg" type="text" value="Organic Spinach Mix"/>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-primary" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Date Picker Section -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-wider">Deadline (Expiry Date)</label>
<div class="bg-white border border-outline rounded-lg overflow-hidden">
<div class="flex items-center p-sm border-b border-outline-variant bg-surface-container-low">
<span class="material-symbols-outlined text-primary mr-sm" data-icon="calendar_today">calendar_today</span>
<input class="bg-transparent border-none text-body-lg font-bold focus:ring-0 w-full" type="date" value="2023-10-27"/>
</div>
<div class="p-sm grid grid-cols-7 gap-1 text-center">
<div class="text-[10px] text-outline font-bold">M</div>
<div class="text-[10px] text-outline font-bold">T</div>
<div class="text-[10px] text-outline font-bold">W</div>
<div class="text-[10px] text-outline font-bold">T</div>
<div class="text-[10px] text-outline font-bold">F</div>
<div class="text-[10px] text-outline font-bold">S</div>
<div class="text-[10px] text-outline font-bold">S</div>
<div class="p-1 text-xs text-outline-variant">20</div>
<div class="p-1 text-xs text-outline-variant">21</div>
<div class="p-1 text-xs text-outline-variant">22</div>
<div class="p-1 text-xs text-outline-variant">23</div>
<div class="p-1 text-xs font-bold text-on-surface">24</div>
<div class="p-1 text-xs font-bold text-on-surface">25</div>
<div class="p-1 text-xs font-bold text-on-surface">26</div>
<div class="p-1 text-xs bg-primary text-white font-bold rounded-full ring-2 ring-primary ring-offset-2">27</div>
<div class="p-1 text-xs font-bold text-on-surface">28</div>
<div class="p-1 text-xs font-bold text-on-surface">29</div>
<div class="p-1 text-xs font-bold text-on-surface">30</div>
<div class="p-1 text-xs font-bold text-on-surface">31</div>
</div>
</div>
</div>
<!-- Quantity & Category Tags -->
<div class="flex gap-sm">
<div class="flex-1 space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-wider">Quantity</label>
<div class="flex items-center border border-outline rounded-lg bg-white overflow-hidden h-12">
<button class="px-sm text-primary font-bold border-r border-outline-variant">-</button>
<input class="w-full text-center border-none focus:ring-0 text-sm" type="text" value="1 pack"/>
<button class="px-sm text-primary font-bold border-l border-outline-variant">+</button>
</div>
</div>
<div class="flex-1 space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-wider">Storage</label>
<select class="w-full bg-white border border-outline rounded-lg h-12 text-sm focus:ring-primary focus:border-primary">
<option>Fridge</option>
<option>Pantry</option>
<option>Freezer</option>
</select>
</div>
</div>
<!-- Action Button -->
<div class="pt-md pb-md">
<button class="w-full bg-primary text-on-primary py-md rounded-lg font-bold text-body-lg flex items-center justify-center gap-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="add_task">add_task</span>
                    Add to Calendar
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-40 bg-surface dark:bg-background border-t border-outline-variant dark:border-outline flex justify-around items-center px-gutter py-xs">
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:opacity-80 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="list_alt">list_alt</span>
<span class="font-label-caps text-label-caps">Inventory</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:opacity-80 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
<span class="font-label-caps text-label-caps">Calendar</span>
</div>
<div class="flex flex-col items-center justify-center group">
<div class="bg-primary-container/20 dark:bg-primary-fixed-dim/20 px-6 py-1 rounded-full mb-1 flex items-center justify-center">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="barcode_scanner" style="font-variation-settings: 'FILL' 1;">barcode_scanner</span>
</div>
<span class="font-label-caps text-label-caps text-primary dark:text-primary-fixed-dim font-bold">Scan</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:opacity-80 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="font-label-caps text-label-caps">Alerts</span>
</div>
</nav>
</body></html>
